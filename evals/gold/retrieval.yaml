# Retrieval gold set: seeded known-item queries.
#
# Size (D17): >= 50 queries. This file has 55.
#
# A known-item query gives the exact title of a real paper and expects that paper's DOI back.
# The metric is recall@k: if a search engine cannot find a paper when handed its exact title,
# it will not find it from a vaguer query either. This is the floor, not the bar.
#
# Every title and DOI here is real and was confirmed present in both OpenAlex and Crossref.

