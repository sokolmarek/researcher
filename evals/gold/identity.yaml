# Axis (a) reference identity gold set.
#
# Vocabulary (D9/D16): verified | mismatch | unresolvable | inconclusive
# Refusal-grade: ONLY unresolvable and mismatch. inconclusive is NEVER refusal-grade.
#
# Size (D17): >= 150 tuples, >= 25 per class, >= 100 negatives. This file has 150,
# with 75 verified / 25 mismatch / 25 unresolvable / 25 inconclusive, and 100 negatives
# (negatives = real references that must NOT be refused: the 75 verified plus the 25
# inconclusive). The negatives are the safety-critical half. A false 'unresolvable' tells a
# researcher their real citation looks fabricated, which is the worst thing this system can do.
#
# Construction, all against live APIs on 2026-07-14:
#   verified      real papers confirmed independently by BOTH OpenAlex and Crossref.
#   mismatch      a REAL, resolving DOI paired with the title/year/author of a DIFFERENT real
#                 paper. This is the wrong-DOI paste, the most common real-world citation defect.
#   unresolvable  invented DOIs, each confirmed to 404 on Crossref, OpenAlex AND DataCite.
#                 These are the only items a correct system may refuse.
#   inconclusive  real DataCite datasets and software, confirmed ABSENT from Crossref. Exactly one
#                 index knows them, so under D9 the evidence is too thin to refuse. A system that
#                 calls these 'unresolvable' is accusing researchers of fabricating real artifacts.

axis: identity
vocabulary: [verified, mismatch, unresolvable, inconclusive]
refusal_grade: [unresolvable, mismatch]
