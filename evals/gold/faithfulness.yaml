# Axis (c) claim faithfulness gold set.
#
# Vocabulary (D16): supported | partial | contradicted | insufficient-passage
# Size (D17): >= 100 claim-passage pairs, >= 20 per class. This file has 104, with
# 26 supported / 26 partial / 26 contradicted / 26 insufficient-passage.
#
# HOW THIS WAS BUILT, and what it is honest about.
#
# Every passage here is REAL. Nothing was invented, paraphrased into existence, or written
# from memory of what a paper probably says. Six open-access documents were fetched with
# researcher_core.fulltext.extract(), indexed with researcher_core.passages.PassageIndex(),
# and the resulting passages were read. Each claim was then written AGAINST a passage that
# was actually in the index, and the pair is anchored on that passage's real ID, which is a
# hash of the document content hash, the section path, the character offsets, and the parser
# version (D21). If the parser version changes, these IDs change, and this file must be
# rebuilt: that is the point of the scheme, not a defect in it.
#
# The six documents are HTML (arXiv HTML and PLOS), not PDF, and deliberately so: HTML
# extraction runs on the stdlib html.parser, so this gold set replays on a BASE install of
# core with no [fulltext] extra and no PyMuPDF. A PDF-sourced gold set would silently make
# the M2 exit gate depend on an optional dependency.
#
# The four classes, and the rule each one was written to:
#
#   supported             The claim restates what the passage says. It reuses the passage's
#                         technical terms, because a real claim about a paper does; it does
#                         not copy the sentence.
#   partial               The claim OVERSTATES or OVER-GENERALIZES the passage. Every one of
#                         these is a claim a careless author would actually write: a result
#                         from one dataset asserted for all datasets, a bounded proportion
#                         asserted as a universal, a hedged finding asserted flatly.
#   contradicted          The claim NEGATES or REVERSES the passage. Some are plain negations
#                         and some are semantic reversals ("limited performance" written up as
#                         "strong performance", a number flipped). The semantic reversals are
#                         included ON PURPOSE: a lexical baseline cannot see them, and a gold
#                         set that only contained contradictions the kernel can catch would be
#                         measuring the gold set instead of the kernel.
#   insufficient-passage  A claim about a REAL paper whose full text is not retrievable
#                         (Unpaywall knows the DOI, no OA copy exists, and the work is not in
#                         arXiv or PMC). There is no passage to anchor on, so there is no
#                         passage_id, and abstention is the ONLY honest answer. These are not
#                         padding: they are the axis (d) degradation path of D11, and they are
#                         what the risk-coverage curve prices.
#
# The claims were written by reading the passages, not by running the classifier and keeping
# what it got right. The measured numbers in evals/BENCHMARKS.md are what they are.

axis: faithfulness
vocabulary: [supported, partial, contradicted, insufficient-passage]
abstention: insufficient-passage
