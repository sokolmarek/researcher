# Dedup gold set: labeled record pairs.
#
# Size (D17): >= 200 labeled pairs. This file has 210: 110 same, 100 different.
#
# Two kinds of duplicate matter and they exercise different code paths:
#   1. Same DOI, two sources. Caught by exact DOI match. The titles still differ in casing,
#      entity escaping, and subtitle handling, because OpenAlex and Crossref genuinely render
#      the same paper differently. These are REAL divergences, harvested live, not simulated.
#   2. Same paper, one side carrying no DOI. Only the normalized-title path can catch these,
#      and it is the case that actually matters: preprints and grey literature are where
#      duplicates hide.
#
# The 'different' pairs include hard negatives: real papers on the same topic with similar
# titles that are NOT the same work. Merging those is not a missed optimization, it is data
# destruction, and it is the failure a loose similarity threshold produces.

axis: dedup
