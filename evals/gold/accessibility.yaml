# Axis (d) accessibility gold set.
#
# Vocabulary (D16): full-text | abstract-only | unavailable
# Size (D17): >= 100 DOIs. This file has 105: abstract-only 33, full-text 42, unavailable 30.
#
# Ground truth comes from Unpaywall, the actual OA authority, queried live on 2026-07-14.
# A DOI Unpaywall does not know is 'unavailable'; a DOI it knows but has no OA copy for is
# 'abstract-only'; a DOI with an OA location is 'full-text'.
#
# Axis (d) exists to contextualize axis (c): an 'insufficient-passage' faithfulness verdict on
# an abstract-only document is expected degradation, not a defect. Without this axis the two
# are indistinguishable, and a system looks broken when it is merely being honest about a
# paywall.

