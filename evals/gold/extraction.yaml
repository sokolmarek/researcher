# M4.7 extraction gold set: labeled extraction cells for the extraction-tables gate (D18).
#
# A cell is a (paper, column, expected value) triple. The gate (M4.7) asks for >= 100 labeled
# cells, >= 20 per column TYPE, with cell-level location accuracy plus an abstention row
# ("not reported" precision) and Wilson CIs (D17). This file has 140 cells across six column
# types (population, method, dataset, metric_name, metric_value, sample_size), of which 27 are
# "not reported" (the paper genuinely does not state that value) so the abstention side is
# measurable.
#
# HOW THIS WAS BUILT, and what it is honest about.
#
# Every value here was read off the paper's OWN text. Nothing was invented, paraphrased into a
# value, or written from memory of what a paper probably reports. A fabricated cell is worse
# than a missing one, so where a value could not be verified from the real text it is labeled
# "not reported" or omitted.
#
# The full-text cells (doc is a URL) are the six open-access documents the axis (c)
# faithfulness gold set also uses: two arXiv HTML papers and four PLOS articles, all indexed
# offline with researcher_core.fulltext.extract() + PassageIndex() from the SAME committed
# snapshots (evals/snapshots/fulltext/...). They anchor at the FULL-TEXT layer. The
# abstract-layer cells (doc is a bare DOI) are papers with no extractable open-access full
# text; their OpenAlex abstract is the only text there is, so those cells anchor at the
# ABSTRACT layer and are never presented as full-text-verified (D11/D18).
#
# Each cell carries:
#   column    one of population | method | dataset | metric_name | metric_value | sample_size
#   expected  the value as written in the paper, or "not reported"
#   query     an ANSWER-FREE probe (what a user searching for this column would type). It never
#             contains the answer, so the present/absent decision cannot cheat off the label.
#   must      the concept token(s) a passage must contain to be "on topic" for this cell. For a
#             present cell these name the concept, not the value; for a "not reported" cell they
#             name the (absent, or present-but-valueless) concept the extractor would ground on.
#
# The runner (evals/run_extraction.py) retrieves the BM25-top passages for `query`, grounds on
# `must`, and for a numeric column requires a digit in the grounded passage before it will say
# a value is stated. A present cell scores right only when the labeled value is ALSO locatable
# in a retrieved passage. Measured numbers live in evals/BENCHMARKS.md; they are what they are.

axis: extraction
column_types: [population, method, dataset, metric_name, metric_value, sample_size]
abstention: not reported
documents:
  - id: "https://arxiv.org/html/2504.01840v1"
    layer: full-text
    title: "LRAGE: Legal Retrieval Augmented Generation Evaluation Tool"
  - id: "https://arxiv.org/html/2606.23915v1"
