name: Bug report
description: "Something does not work: a skill misbehaves, a script fails, LaTeX will not compile, or a command does nothing."
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        If the bug is a fabricated citation or invented data, please use the integrity template
        instead: those are triaged first.

  - type: textarea
    id: what
    attributes:
      label: What happened, and what you expected instead
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: The prompt or command, and the smallest input that shows the problem.
      render: text
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output or error
      description: Paste the error, the failing command's output, or the LaTeX log excerpt.
      render: text

  - type: dropdown
    id: agent
    attributes:
      label: Where are you running it
      options:
        - Claude Code
        - Claude Cowork
        - OpenAI Codex (skills installed with install-codex-skills.py)
        - Standalone script, no agent
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "0.1.0 (see .claude-plugin/plugin.json)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: latex
    attributes:
      label: LaTeX engine, if the bug involves compiling
      description: Which TeX installation you have, if any.
      placeholder: "MiKTeX, TeX Live, MacTeX, tectonic, or none"
