name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  # id-token is for OIDC: Sigstore keyless signing in the release job and PyPI trusted
  # publishing in the publish job. No stored keys, no stored tokens (D13/D14).
  id-token: write

env:
  CLAUDE_CLI_VERSION: "2.1.209"
  PYTHON_VERSION: "3.12"

jobs:
  # The full PR suite (plugin validation, guards, pytest on Linux and Windows,
  # the Codex install, the DOCX build, both LaTeX engines) is the release gate.
  # Calling it here rather than restating a subset of it means a tag can never
  # ship a red test suite or a tripped guard, and the two can never drift apart.
  full-validation:
    uses: ./.github/workflows/validate.yml

  validate:
    name: Tag, manifest and changelog agree
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Tag must match plugin.json and CHANGELOG
        run: |
          set -e
          VERSION="${{ steps.ver.outputs.version }}"
          MANIFEST=$(python3 -c "import json;print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if [ "$VERSION" != "$MANIFEST" ]; then
            echo "Tag version ($VERSION) does not match .claude-plugin/plugin.json ($MANIFEST)."
            exit 1
          fi
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG.md has no '## [$VERSION]' section."
            exit 1
          fi
          CFF=$(python3 -c "import re,sys; m=re.search(r'^version:\s*(\S+)', open('CITATION.cff').read(), re.M); print(m.group(1).strip('\"') if m else '')")
          if [ "$VERSION" != "$CFF" ]; then
            echo "Tag version ($VERSION) does not match CITATION.cff ($CFF)."
            exit 1
          fi
          MKT=$(python3 -c "import json;print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")
          if [ "$VERSION" != "$MKT" ]; then
            echo "Tag version ($VERSION) does not match marketplace.json ($MKT)."
            exit 1
          fi
          echo "Tag, plugin.json, marketplace.json, CHANGELOG, and CITATION.cff agree on $VERSION."

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22

      - name: Install Claude Code CLI (pinned)
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CLI_VERSION}"

      - name: Validate plugin manifest and components
        run: claude plugin validate .claude-plugin/plugin.json

      - name: Validate marketplace manifest
        run: claude plugin validate .claude-plugin/marketplace.json

  release:
    needs: [validate, full-validation]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Package the plugin
        run: |
          # core/ ships (it is the kernel), but its local tool caches never do. A fresh CI
          # checkout has none of these, but excluding them keeps the package correct even if a
          # future step runs `uv sync` before packaging.
          zip -r "researcher-${{ needs.validate.outputs.tag }}.zip" . \
            -x '.git/*' -x 'docs/*' -x 'assets/*' -x '.github/*' -x '*.zip' \
            -x 'templates/word/node_modules/*' \
            -x 'core/.venv/*' -x 'core/.pytest_cache/*' -x 'core/.ruff_cache/*' \
            -x 'core/.mypy_cache/*' -x '*/__pycache__/*' -x '*.pyc'

      - name: The package must contain a working plugin
        # A file-by-file check alone is not enough: an -x exclude pattern that
        # over-matched could drop skills/ or .claude-plugin/ wholesale and still
        # pass it, shipping an empty, unusable plugin. So this asserts the
        # manifests, the runtime files, every runtime directory, and the skill
        # count.
        #
        # Matching is exact, on full entry names from `unzip -Z1`. Info-ZIP stores
        # `zip -r <zip> .` entries as 'skills/foo/SKILL.md' with no './' prefix
        # (verified against Info-ZIP 3.x), so the old ' path$' grep, anchored on a
        # leading space, was an unnecessary assumption about column layout.
        run: |
          set -euo pipefail
          ZIP="researcher-${{ needs.validate.outputs.tag }}.zip"
          unzip -Z1 "$ZIP" > entries.txt
          bad=0

          # The manifests the entire install depends on.
          for path in \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json
          do
            if ! grep -qxF "$path" entries.txt; then
              echo "Missing manifest: $path"
              bad=1
            fi
          done

          # Runtime files.
          for path in \
            hooks/hooks.json \
            references/integrity-constraints.md \
            references/figure-styles.md \
            references/core-cli.md \
            scripts/citation-check-hook.py \
            scripts/draft-integrity-hook.py \
            scripts/install-git-hooks.py \
            scripts/install-codex-skills.py \
            scripts/latex-compile.py \
            scripts/latex_engine.py \
            evals/example-freshness.py \
            templates/word/build-docx.js \
            core/pyproject.toml \
            core/researcher_core/cli.py
          do
            if ! grep -qxF "$path" entries.txt; then
              echo "Missing from the release package: $path"
              bad=1
            fi
          done

          # Every runtime directory must be present and non-empty. core/ is the evidence
          # kernel, the whole point of 0.3.0: an exclude pattern that dropped it would ship
          # a plugin that silently loses citation verification, so it is asserted here too.
          for dir in \
            .claude-plugin \
            skills \
            agents \
            commands \
            connectors \
            references \
            templates \
            scripts \
            hooks \
            evals \
            examples \
            core \
            core/researcher_core/connectors
          do
            n=$(grep -cE "^${dir}/.*[^/]$" entries.txt || true)
            if [ "$n" -eq 0 ]; then
              echo "Release package has no files under ${dir}/"
              bad=1
            else
              echo "  ${dir}/: ${n} files"
            fi
          done

          # Every skill in the source tree, not just some of them. The expected count is
          # derived from the tree so it cannot go stale when skills are added.
          expected=$(ls skills/*/SKILL.md | wc -l)
          skills=$(grep -cE '^skills/[^/]+/SKILL\.md$' entries.txt || true)
          if [ "$skills" -ne "$expected" ]; then
            echo "Expected ${expected} skills/*/SKILL.md in the package, found ${skills}."
            bad=1
          fi

          # All 8 kernel connectors. A partial connector set is a silently degraded kernel.
          conns=$(grep -cE '^core/researcher_core/connectors/[a-z_]+\.py$' entries.txt || true)
          if [ "$conns" -lt 9 ]; then
            echo "Expected the 8 connectors plus base.py under core/.../connectors/, found ${conns}."
            bad=1
          fi

          if [ "$bad" -ne 0 ]; then
            echo "The release package is incomplete. Not shipping it."
            exit 1
          fi
          echo "Package holds both manifests, all runtime files, ${skills} skills, and every runtime directory."

      - name: Extract changelog notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${{ needs.validate.outputs.tag }}." > RELEASE_NOTES.md
          fi

      - name: Generate SBOMs (CycloneDX)
        # A CycloneDX SBOM for the Python kernel and one for the Word toolchain, so a consumer
        # can see exactly what the release depends on. Pinned tools, no floating latest. The
        # kernel is installed into a throwaway venv first because `cyclonedx-py environment`
        # reads an installed environment, not a source directory. Both steps fail loudly: an
        # empty or missing SBOM must never be signed and shipped.
        run: |
          set -e
          python -m venv "$RUNNER_TEMP/core-env"
          "$RUNNER_TEMP/core-env/bin/pip" install --quiet ./core
          pipx run --spec 'cyclonedx-bom==5.3.0' cyclonedx-py environment \
            "$RUNNER_TEMP/core-env/bin/python" \
            --output-format json --outfile core-sbom.cdx.json
          ( cd templates/word && npm ci --no-audit --no-fund && \
            npm sbom --sbom-format cyclonedx > ../../word-sbom.cdx.json )
          [ -s core-sbom.cdx.json ] && [ -s word-sbom.cdx.json ]

      - name: Sign the artifacts (Sigstore keyless)
        # OIDC keyless signing, no stored keys, consistent with the no-token posture (D13/D14).
        # Each artifact gets a .sig and a .pem certificate; the README documents cosign verify-blob.
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: cosign sign-blob
        run: |
          set -e
          for f in "researcher-${{ needs.validate.outputs.tag }}.zip" core-sbom.cdx.json word-sbom.cdx.json; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: ${{ needs.validate.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            researcher-${{ needs.validate.outputs.tag }}.zip
            researcher-${{ needs.validate.outputs.tag }}.zip.sig
            researcher-${{ needs.validate.outputs.tag }}.zip.pem
            core-sbom.cdx.json
            core-sbom.cdx.json.sig
            core-sbom.cdx.json.pem
            word-sbom.cdx.json
            word-sbom.cdx.json.sig
            word-sbom.cdx.json.pem
          draft: false
          prerelease: false

  # Publish researcher-core to PyPI via OIDC trusted publishing (no stored token, D13). The
  # package version comes from core/pyproject.toml, NOT from the tag, so a plugin tag whose core
  # version is unchanged simply uploads nothing new rather than failing on a duplicate version.
  pypi-publish:
    needs: [validate, full-validation]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build the sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build core
      - name: Skip if this core version is already on PyPI
        id: check
        run: |
          VERSION="$(python -c "import tomllib;print(tomllib.load(open('core/pyproject.toml','rb'))['project']['version'])")"
          # Exact-version lookup against the PyPI JSON API: an unanchored grep would let
          # 1.0.0 match 1.0.0rc1, or 1.0.1 match 1.0.10.
          if curl -fsS "https://pypi.org/pypi/researcher-core/${VERSION}/json" > /dev/null 2>&1; then
            echo "researcher-core $VERSION is already published, skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to PyPI (OIDC trusted publishing)
        if: steps.check.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 branch head, 2026-07-16
        with:
          packages-dir: core/dist
